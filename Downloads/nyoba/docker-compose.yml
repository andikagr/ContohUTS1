version: '3.8'

services:
  # ===== Database =====
  mongodb:
    image: mongo:7
    container_name: ecommerce-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ===== User Service =====
  user-service:
    build: ./user-service
    container_name: ecommerce-user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongodb:27017/users_db
    depends_on:
      - mongodb
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ===== Product Service =====
  product-service:
    build: ./product-service
    container_name: ecommerce-product-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongodb:27017/products_db
    depends_on:
      - mongodb
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ===== Order Service =====
  order-service:
    build: ./order-service
    container_name: ecommerce-order-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://mongodb:27017/orders_db
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
    depends_on:
      - mongodb
      - user-service
      - product-service
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ===== API Gateway =====
  api-gateway:
    build: ./api-gateway
    container_name: ecommerce-api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - ORDER_SERVICE_URL=http://order-service:3003
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ===== Frontend =====
  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    networks:
      - ecommerce-network
    restart: unless-stopped

# ===== Network =====
networks:
  ecommerce-network:
    driver: bridge

# ===== Volumes =====
volumes:
  mongodb_data:
