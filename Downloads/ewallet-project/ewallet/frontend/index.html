<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayFlow — E-Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --danger: #ff4f6b;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --success: #00d4aa;
      --warning: #ffb86c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- HEADER ---- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(19,19,26,0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 8px; }
    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-btn:hover, .nav-btn.active {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--accent);
    }
    .status-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ---- LAYOUT ---- */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 40px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ---- STAT CARDS ---- */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 100px; height: 100px;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity: 0.08;
      border-radius: 50%;
      transform: translate(30px, -30px);
    }
    .stat-label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .stat-value.green { color: var(--success); }
    .stat-value.purple { color: var(--accent); }

    /* ---- SECTION HEADER ---- */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title { font-size: 18px; font-weight: 600; }

    /* ---- TABLES ---- */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 14px 20px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tbody tr:last-child td { border-bottom: none; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge.success { background: rgba(0,212,170,0.15); color: var(--success); }
    .badge.failed { background: rgba(255,79,107,0.15); color: var(--danger); }
    .badge.pending { background: rgba(255,184,108,0.15); color: var(--warning); }
    .badge.transfer { background: rgba(108,99,255,0.15); color: var(--accent); }
    .badge.topup { background: rgba(0,212,170,0.15); color: var(--success); }

    /* ---- BUTTONS ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #5a52e0; transform: translateY(-1px); }
    .btn-success { background: var(--success); color: #000; }
    .btn-success:hover { background: #00b894; }
    .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 6px 14px; font-size: 12px; }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    /* ---- MODALS ---- */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }

    /* ---- FORMS ---- */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-cancel { background: var(--surface2); color: var(--muted); flex: 1; justify-content: center; }
    .btn-submit { flex: 2; justify-content: center; }

    /* ---- TOAST ---- */
    #toast {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideUp 0.2s ease;
    }
    #toast.show { display: flex; }
    #toast.success { border-color: var(--success); }
    #toast.error { border-color: var(--danger); }

    /* ---- LOADING ---- */
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to{ transform: rotate(360deg); } }

    /* ---- EMPTY ---- */
    .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }

    /* ---- RESPONSIVE ---- */
    @media(max-width: 768px) {
      header { padding: 16px 20px; }
      main { padding: 20px; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Pay<span>Flow</span></div>
  <nav class="nav-links">
    <button class="nav-btn active" onclick="showPage('users')">👥 Users</button>
    <button class="nav-btn" onclick="showPage('transactions')">💳 Transactions</button>
    <button class="nav-btn" onclick="showPage('transfer')">⚡ Transfer</button>
  </nav>
  <div class="status-dot">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</header>

<main>
  <!-- USERS PAGE -->
  <div class="page active" id="page-users">
    <div class="stats-grid" id="userStats">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value purple" id="totalUsers">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Balance</div>
        <div class="stat-value green" id="totalBalance">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Balance</div>
        <div class="stat-value" id="avgBalance">—</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">User Accounts</div>
      <button class="btn btn-primary" onclick="openModal('addUserModal')">＋ Add User</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Phone</th>
            <th>Balance</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- TRANSACTIONS PAGE -->
  <div class="page" id="page-transactions">
    <div class="section-header">
      <div class="section-title">All Transactions</div>
      <button class="btn btn-primary btn-sm" onclick="loadTransactions()">↻ Refresh</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>From</th><th>To</th><th>Amount</th>
            <th>Type</th><th>Status</th><th>Description</th><th>Date</th>
          </tr>
        </thead>
        <tbody id="txBody">
          <tr><td colspan="8" class="loading"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- TRANSFER PAGE -->
  <div class="page" id="page-transfer">
    <div style="max-width:500px;margin:0 auto;">
      <div class="section-title" style="margin-bottom:24px;">⚡ Quick Transfer & Top Up</div>

      <!-- Transfer -->
      <div class="table-wrap" style="padding:28px;margin-bottom:24px;">
        <div style="font-size:16px;font-weight:600;margin-bottom:20px;color:var(--accent);">💸 Transfer</div>
        <div class="form-group">
          <label>From (Sender ID)</label>
          <select id="t_sender"></select>
        </div>
        <div class="form-group">
          <label>To (Receiver ID)</label>
          <select id="t_receiver"></select>
        </div>
        <div class="form-group">
          <label>Amount (Rp)</label>
          <input type="number" id="t_amount" placeholder="50000" min="1000" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="t_desc" placeholder="Bayar makan siang" />
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doTransfer()">Transfer</button>
      </div>

      <!-- Top Up -->
      <div class="table-wrap" style="padding:28px;">
        <div style="font-size:16px;font-weight:600;margin-bottom:20px;color:var(--success);">💰 Top Up</div>
        <div class="form-group">
          <label>User</label>
          <select id="tu_user"></select>
        </div>
        <div class="form-group">
          <label>Amount (Rp)</label>
          <input type="number" id="tu_amount" placeholder="100000" min="10000" />
        </div>
        <button class="btn btn-success" style="width:100%;justify-content:center;" onclick="doTopup()">Top Up</button>
      </div>
    </div>
  </div>
</main>

<!-- ADD USER MODAL -->
<div class="modal-overlay" id="addUserModal">
  <div class="modal">
    <div class="modal-title">👤 Add New User</div>
    <div class="form-group"><label>Full Name *</label><input id="u_name" placeholder="Budi Santoso" /></div>
    <div class="form-group"><label>Email *</label><input id="u_email" type="email" placeholder="budi@email.com" /></div>
    <div class="form-group"><label>Phone</label><input id="u_phone" placeholder="081234567890" /></div>
    <div class="form-group"><label>Initial Balance (Rp)</label><input id="u_balance" type="number" placeholder="0" /></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal('addUserModal')">Cancel</button>
      <button class="btn btn-primary btn-submit" onclick="addUser()">Create User</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const API = 'http://localhost:3000/api';
  let users = [];

  // ---- UTILS ----
  const fmt = n => 'Rp ' + parseFloat(n).toLocaleString('id-ID');
  const fmtDate = d => new Date(d).toLocaleDateString('id-ID', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
    t.className = 'show ' + type;
    setTimeout(() => t.className = '', 3000);
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'transactions') loadTransactions();
    if (name === 'transfer') populateSelects();
  }

  // ---- HEALTH CHECK ----
  async function checkHealth() {
    try {
      const r = await fetch(`http://localhost:3000/health`);
      const d = await r.json();
      const allOk = d.userService === 'ok' && d.paymentService === 'ok';
      document.getElementById('statusDot').style.background = allOk ? '#00d4aa' : '#ff4f6b';
      document.getElementById('statusText').textContent = allOk ? 'All services online' : 'Some services down';
    } catch {
      document.getElementById('statusDot').style.background = '#ff4f6b';
      document.getElementById('statusText').textContent = 'Gateway offline';
    }
  }

  // ---- USERS ----
  async function loadUsers() {
    try {
      const r = await fetch(`${API}/users`);
      const d = await r.json();
      users = d.data || [];

      // Stats
      const total = users.reduce((s, u) => s + parseFloat(u.balance), 0);
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('totalBalance').textContent = fmt(total);
      document.getElementById('avgBalance').textContent = users.length ? fmt(total / users.length) : 'Rp 0';

      const tbody = document.getElementById('usersBody');
      if (!users.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No users found</td></tr>'; return; }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td class="mono">#${u.id}</td>
          <td><strong>${u.name}</strong></td>
          <td style="color:var(--muted)">${u.email}</td>
          <td style="color:var(--muted)">${u.phone || '—'}</td>
          <td class="mono" style="color:var(--success)">${fmt(u.balance)}</td>
          <td><button class="btn btn-danger" onclick="deleteUser(${u.id})">Delete</button></td>
        </tr>
      `).join('');
    } catch {
      document.getElementById('usersBody').innerHTML = '<tr><td colspan="6" class="empty">Failed to load users — is the API Gateway running?</td></tr>';
    }
  }

  async function addUser() {
    const body = {
      name: document.getElementById('u_name').value,
      email: document.getElementById('u_email').value,
      phone: document.getElementById('u_phone').value,
      balance: parseFloat(document.getElementById('u_balance').value) || 0,
    };
    if (!body.name || !body.email) return showToast('Name and email required', 'error');
    const r = await fetch(`${API}/users`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.success) { showToast('User created!'); closeModal('addUserModal'); loadUsers(); }
    else showToast(d.message, 'error');
  }

  async function deleteUser(id) {
    if (!confirm('Delete this user?')) return;
    const r = await fetch(`${API}/users/${id}`, { method: 'DELETE' });
    const d = await r.json();
    if (d.success) { showToast('User deleted'); loadUsers(); }
    else showToast(d.message, 'error');
  }

  // ---- TRANSACTIONS ----
  async function loadTransactions() {
    try {
      const r = await fetch(`${API}/transactions`);
      const d = await r.json();
      const txs = d.data || [];
      const tbody = document.getElementById('txBody');
      if (!txs.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">No transactions yet</td></tr>'; return; }
      tbody.innerHTML = txs.map(t => `
        <tr>
          <td class="mono">#${t.id}</td>
          <td class="mono">#${t.sender_id}</td>
          <td class="mono">#${t.receiver_id}</td>
          <td class="mono" style="color:var(--warning)">${fmt(t.amount)}</td>
          <td><span class="badge ${t.type}">${t.type}</span></td>
          <td><span class="badge ${t.status}">${t.status}</span></td>
          <td style="color:var(--muted)">${t.description || '—'}</td>
          <td style="color:var(--muted);font-size:12px">${fmtDate(t.created_at)}</td>
        </tr>
      `).join('');
    } catch {
      document.getElementById('txBody').innerHTML = '<tr><td colspan="8" class="empty">Failed to load</td></tr>';
    }
  }

  // ---- TRANSFER ----
  function populateSelects() {
    const opts = users.map(u => `<option value="${u.id}">${u.name} — ${fmt(u.balance)}</option>`).join('');
    ['t_sender','t_receiver','tu_user'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = opts;
    });
  }

  async function doTransfer() {
    const body = {
      sender_id: parseInt(document.getElementById('t_sender').value),
      receiver_id: parseInt(document.getElementById('t_receiver').value),
      amount: parseFloat(document.getElementById('t_amount').value),
      description: document.getElementById('t_desc').value,
    };
    if (!body.amount) return showToast('Enter amount', 'error');
    const r = await fetch(`${API}/transactions/transfer`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.success) { showToast('Transfer successful! ✨'); loadUsers(); populateSelects(); }
    else showToast(d.message, 'error');
  }

  async function doTopup() {
    const body = {
      user_id: parseInt(document.getElementById('tu_user').value),
      amount: parseFloat(document.getElementById('tu_amount').value),
    };
    if (!body.amount) return showToast('Enter amount', 'error');
    const r = await fetch(`${API}/transactions/topup`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.success) { showToast('Top up successful! 💰'); loadUsers(); populateSelects(); }
    else showToast(d.message, 'error');
  }

  // ---- INIT ----
  checkHealth();
  setInterval(checkHealth, 10000);
  loadUsers();
</script>
</body>
</html>
